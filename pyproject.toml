[project]
name = "blast-radius"
version = "0.1.0"
description = "AI-powered blast radius analyzer: git diff → code graph traversal → auto-generated tests"
requires-python = ">=3.10"
dependencies = [
    "falkordb",
    "google-cloud-aiplatform",
    "python-dotenv",
    "pytest",
    "pytest-json-report",
    "typer",
    "tree-sitter-language-pack==0.6.0",
    "codegraphcontext",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-json-report",
]

[project.scripts]
blast-radius = "blast_radius.__main__:app"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
